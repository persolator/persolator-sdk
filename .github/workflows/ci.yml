name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify dist
        run: |
          test -f dist/index.js   || (echo "Missing ESM build"  && exit 1)
          test -f dist/index.cjs  || (echo "Missing CJS build"  && exit 1)
          test -f dist/index.d.ts || (echo "Missing types"      && exit 1)
          echo "All dist files present"
